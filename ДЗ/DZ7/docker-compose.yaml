services:
  db:
    image: postgres:15
    container_name: dz7-postgres
    command:
      - postgres
      - -c
      - log_statement=all
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.track=all
    environment:
      POSTGRES_DB: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5438:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    logging:
      driver: "syslog"
      options:
        syslog-address: "udp://127.0.0.1:5001"
        tag: "postgresql"
    depends_on:
      - logstash

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: dz7-logstash
    command: logstash -f /logstash.conf
    volumes:
      - ./logstash.conf:/logstash.conf:ro
    ports:
      - "5001:5001/udp"
      - "5002:5002/udp"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: dz7-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: dz7-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch

  jaeger:
    image: jaegertracing/all-in-one:1.54
    container_name: dz7-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    container_name: dz7-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@db:5432/db?sslmode=disable"
    depends_on:
      - db

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: dz7-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:10.2.0
    container_name: dz7-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    ports:
      - "3001:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - jaeger

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dz7-app
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces
    ports:
      - "8088:8080"
    depends_on:
      - db
      - jaeger
      - logstash
    logging:
      driver: "syslog"
      options:
        syslog-address: "udp://127.0.0.1:5002"
        tag: "app"

volumes:
  postgres_data:
