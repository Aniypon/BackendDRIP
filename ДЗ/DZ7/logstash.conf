input {
  syslog {
    port => 5001
    type => "syslog_plain"
  }
  syslog {
    port => 5002
    type => "syslog_json"
  }
}

filter {
  if [type] == "syslog_json" {
    json {
      source => "message"
    }
    mutate {
      add_field => { "environment" => "docker" }
      remove_field => [ "message" ]
    }
    if [timestamp] {
      date {
        match => [ "timestamp", "ISO8601" ]
        target => "@timestamp"
      }
    }
  }

  if [type] == "syslog_plain" {
    mutate {
      add_field => {
        "service" => "%{tag}"
        "environment" => "docker"
      }
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "logs-%{+YYYY.MM.dd}"
  }
}
