# PostgreSQL (реляционное, JPA/Hibernate)
spring.datasource.url=jdbc:postgresql://postgres:5432/mydatabase
spring.datasource.username=admin
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# MongoDB (документное)
spring.data.mongodb.uri=mongodb://admin:password@mongo:27017/mydatabase?authSource=admin

# Redis (key-value / кэш)
spring.data.redis.host=redis
spring.data.redis.port=6379

# ClickHouse (колоночное OLAP)
clickhouse.url=jdbc:clickhouse://clickhouse:8123/mydatabase?compress=0
clickhouse.user=admin
clickhouse.password=password

# S3 / MinIO (объектное)
s3.endpoint=http://minio:9000
s3.access-key=minioAccessKey
s3.secret-key=minioSecretKey

spring.main.web-application-type=none
