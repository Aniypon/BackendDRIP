services:
  postgres-db1:
    image: postgres:15
    container_name: dz2-postgres-db1
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
      POSTGRES_DB: app_db1
    ports:
      - "5433:5432"
    volumes:
      - postgres_db1_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d app_db1"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - db1_network

  postgres-db2:
    image: postgres:15
    container_name: dz2-postgres-db2
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
      POSTGRES_DB: app_db2
    ports:
      - "5434:5432"
    volumes:
      - postgres_db2_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d app_db2"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - db2_network

  flyway-db1:
    image: flyway/flyway:10.10.0
    container_name: dz2-flyway-db1
    command: ["migrate"]
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres-db1:5432/app_db1
      FLYWAY_USER: app_user
      FLYWAY_PASSWORD: app_password
      FLYWAY_LOCATIONS: filesystem:/flyway/sql
    volumes:
      - ./migrations/db1:/flyway/sql
    depends_on:
      postgres-db1:
        condition: service_healthy
    networks:
      - db1_network

  flyway-db2:
    image: flyway/flyway:10.10.0
    container_name: dz2-flyway-db2
    command: ["migrate"]
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres-db2:5432/app_db2
      FLYWAY_USER: app_user
      FLYWAY_PASSWORD: app_password
      FLYWAY_LOCATIONS: filesystem:/flyway/sql
    volumes:
      - ./migrations/db2:/flyway/sql
    depends_on:
      postgres-db2:
        condition: service_healthy
    networks:
      - db2_network

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: dz2-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: password
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5051:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json
    depends_on:
      - postgres-db1
      - postgres-db2
    networks:
      - db1_network
      - db2_network

  app:
    build: .
    container_name: dz2-app
    depends_on:
      flyway-db1:
        condition: service_completed_successfully
      flyway-db2:
        condition: service_completed_successfully
    networks:
      - db1_network
      - db2_network

volumes:
  postgres_db1_data:
  postgres_db2_data:
  pgadmin_data:

networks:
  db1_network:
    driver: bridge
  db2_network:
    driver: bridge
