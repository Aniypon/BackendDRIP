spring.application.name=order-service
server.port=8081

# Database Configuration
spring.datasource.url=jdbc:postgresql://order-db:5432/order_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate=ERROR

# Resilience4j Circuit Breaker Configuration
resilience4j.circuitbreaker.instances.user-service.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.user-service.slidingWindowSize=10
resilience4j.circuitbreaker.instances.user-service.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.user-service.failureRateThreshold=50
resilience4j.circuitbreaker.instances.user-service.waitDurationInOpenState=10000
resilience4j.circuitbreaker.instances.user-service.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.user-service.automaticTransitionFromOpenToHalfOpenEnabled=true

# Resilience4j Retry Configuration for user-service
resilience4j.retry.instances.user-service.maxAttempts=3
resilience4j.retry.instances.user-service.waitDuration=1s
resilience4j.retry.instances.user-service.enableExponentialBackoff=true
resilience4j.retry.instances.user-service.exponentialBackoffMultiplier=2
resilience4j.retry.instances.user-service.ignoreExceptions=java.lang.IllegalArgumentException
