openapi: 3.0.3
info:
  title: User Service API
  version: 1.0.0
  description: Simple API for user management

servers:
  - url: http://localhost:8081

paths:
  /api/users/{id}:
    get:
      tags:
        - user
      summary: Get user by ID
      operationId: getUserById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found

  /api/users:
    post:
      tags:
        - user
      summary: Create a new user
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '200':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          description: User ID (auto-generated)
        username:
          type: string
          minLength: 1
          maxLength: 50
          description: Unique username
      required:
        - username

    CreateUserRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 50
          description: Unique username
      required:
        - username
