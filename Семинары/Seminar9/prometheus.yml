global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'user-database'
    static_configs:
      - targets: ['user-postgres-exporter:9187']
        labels:
          database_type: 'user-database'

  - job_name: 'order-database'
    static_configs:
      - targets: ['order-postgres-exporter:9187']
        labels:
          database_type: 'order-database'

  - job_name: 'user-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['user-service:8080']

  - job_name: 'order-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['order-service:8080']
